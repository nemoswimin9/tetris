<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>elfan의 작업실 — AI 리모컨 & 테트리스</title>
<meta name="description" content="브라우저에서 바로 즐기는 AI 서비스 런처와 테트리스 게임" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: "Segoe UI", -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
    color: #2b2440;
    background:
      radial-gradient(900px 600px at 80% -10%, #ffe2c8 0%, transparent 60%),
      radial-gradient(800px 700px at -10% 30%, #d6e6ff 0%, transparent 60%),
      radial-gradient(700px 800px at 60% 110%, #ffd9ec 0%, transparent 60%),
      linear-gradient(180deg, #fff5ec 0%, #f3ecff 60%, #e8f4ff 100%);
    overflow-x: hidden;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content:""; position: fixed; inset: 0; pointer-events: none; opacity: .35;
    background-image: radial-gradient(rgba(255,255,255,.45) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: overlay;
  }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .stars i {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: #fff; box-shadow: 0 0 12px #fff, 0 0 4px #fff;
    opacity: .55; animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { transform: scale(1); opacity: .25; }
    50% { transform: scale(1.6); opacity: 1; }
  }

  main {
    position: relative; z-index: 1;
    max-width: 1080px; margin: 0 auto;
    padding: 56px 24px 64px;
  }
  .badge {
    display: inline-flex; gap: 8px; align-items: center;
    background: rgba(255,255,255,.7);
    border: 1px solid rgba(43,36,64,.08);
    padding: 6px 14px; border-radius: 999px;
    font-size: 12px; letter-spacing: 1.5px;
    color: #6b5f8a; backdrop-filter: blur(8px);
    box-shadow: 0 8px 30px rgba(80,60,140,.08);
  }
  .badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #4cd964; box-shadow: 0 0 8px #4cd964;
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity: .3; } }

  header {
    text-align: center; margin-bottom: 48px;
  }
  header h1 {
    margin: 14px 0 8px;
    font-size: clamp(34px, 5vw, 52px);
    font-weight: 800; letter-spacing: -.5px;
    background: linear-gradient(90deg, #ff8a5b, #c879ff 50%, #5b8dff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header p {
    margin: 0; color: #6b5f8a;
    font-size: clamp(14px, 1.5vw, 16px);
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
  }
  @media (max-width: 720px) {
    .cards { grid-template-columns: 1fr; }
  }

  .card {
    position: relative;
    display: flex; flex-direction: column;
    text-decoration: none; color: inherit;
    background: rgba(255,255,255,.78);
    border-radius: 28px;
    padding: 28px 28px 26px;
    border: 1px solid rgba(80,40,120,.08);
    box-shadow:
      0 22px 44px rgba(80,40,120,.14),
      0 4px 10px rgba(80,40,120,.08),
      inset 0 1px 0 rgba(255,255,255,.8);
    backdrop-filter: blur(10px);
    overflow: hidden;
    transition: transform .35s cubic-bezier(.34, 1.56, .64, 1),
                box-shadow .35s ease;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow:
      0 32px 60px rgba(80,40,120,.22),
      0 8px 16px rgba(80,40,120,.1),
      inset 0 1px 0 rgba(255,255,255,.9);
  }
  .card::after {
    content: ""; position: absolute; inset: 0;
    background: var(--accent-glow, transparent);
    opacity: 0; transition: opacity .35s ease;
    pointer-events: none; border-radius: inherit;
    mix-blend-mode: overlay;
  }
  .card:hover::after { opacity: 1; }

  .card-art {
    aspect-ratio: 5 / 3;
    border-radius: 18px;
    margin-bottom: 18px;
    display: grid; place-items: center;
    background: var(--art-bg);
    overflow: hidden;
    position: relative;
  }
  .card-art svg {
    width: 80%; height: 80%;
    transition: transform .5s cubic-bezier(.34, 1.56, .64, 1);
  }
  .card:hover .card-art svg { transform: scale(1.06) rotate(-2deg); }

  .card h2 {
    margin: 0 0 6px; font-size: 22px; font-weight: 800;
    letter-spacing: -.3px; color: #2b2440;
  }
  .card p {
    margin: 0; color: #6b5f8a; font-size: 14px;
    line-height: 1.55;
  }
  .card .row {
    margin-top: 18px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px;
  }
  .card .meta {
    display: inline-flex; gap: 6px;
    font-size: 11px; letter-spacing: 1.2px; color: #6b5f8a;
    text-transform: uppercase;
  }
  .card .meta span {
    background: rgba(43,36,64,.06);
    padding: 3px 8px; border-radius: 6px;
  }
  .card .cta {
    display: inline-flex; gap: 6px; align-items: center;
    font-size: 13px; font-weight: 700;
    padding: 10px 16px; border-radius: 12px;
    background: var(--accent); color: #fff;
    box-shadow: 0 6px 14px var(--accent-shadow);
    transition: transform .2s ease;
  }
  .card:hover .cta { transform: translateX(4px); }
  .card .cta::after { content: "→"; transition: transform .25s ease; }
  .card:hover .cta::after { transform: translateX(3px); }

  /* per-card accents */
  .card-remote {
    --accent: linear-gradient(135deg, #ff8a5b, #d63a52);
    --accent-shadow: rgba(214,58,82,.32);
    --accent-glow: linear-gradient(135deg, rgba(255,138,91,.12), transparent 60%);
    --art-bg: linear-gradient(160deg, #2a2340 0%, #4a3f6b 100%);
  }
  .card-tetris {
    --accent: linear-gradient(135deg, #5b8dff, #c879ff);
    --accent-shadow: rgba(91,141,255,.32);
    --accent-glow: linear-gradient(135deg, rgba(91,141,255,.12), transparent 60%);
    --art-bg: linear-gradient(160deg, #1a1c3a 0%, #2a2350 100%);
  }

  footer {
    margin-top: 48px;
    text-align: center;
    color: #8076a0;
    font-size: 12px;
    letter-spacing: .5px;
  }
  footer a {
    color: #6b5b9e; text-decoration: none;
    border-bottom: 1px dotted #b3a4d2;
    transition: color .2s ease, border-color .2s ease;
  }
  footer a:hover { color: #2b2440; border-color: #2b2440; }

  /* art animations */
  @keyframes pulse {
    0%, 100% { opacity: .9; }
    50% { opacity: .5; }
  }
  @keyframes drift {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .pulse { animation: pulse 2.4s ease-in-out infinite; }
  .drift { animation: drift 3s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
</style>
</head>
<body>
